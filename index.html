<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Web Client – Login</title>
</head>

<body>
    <h1>Minecraft Web Client – Authentication</h1>

    <p>This page handles Microsoft → Xbox Live → XSTS authentication.</p>

    <button onclick="redirectToMicrosoft()">Start Microsoft Login</button>

    <h3>Microsoft Token</h3>
    <pre id="loginOutput"></pre>

    <button onclick="authXBL()">Authenticate with Xbox Live</button>
    <pre id="xblOutput"></pre>

    <button onclick="authXSTS()">Request XSTS Token</button>
    <pre id="xstsOutput"></pre>

    <button id="continueBtn" style="display:none;" onclick="goToClient()">Continue to Client</button>

<script>
function redirectToMicrosoft() {
    window.location.href = "https://minecraftwebclient-backend.onrender.com/auth/login";
}

async function checkForMsToken() {
    const params = new URLSearchParams(window.location.search);
    const rawToken = params.get("ms_token");
    if (!rawToken) return;

    let msToken;
    try {
        msToken = JSON.parse(decodeURIComponent(rawToken));
    } catch {
        document.getElementById("loginOutput").textContent = "Failed to parse ms_token.";
        return;
    }

    document.getElementById("loginOutput").textContent = JSON.stringify(msToken, null, 2);
    window.msAccessToken = msToken.access_token;

    window.history.replaceState({}, document.title, "/MinecraftWebClient/");
}

async function authXBL() {
    if (!window.msAccessToken) return alert("Login first.");

    const res = await fetch("https://minecraftwebclient-backend.onrender.com/auth/xbl", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ access_token: window.msAccessToken })
    });

    document.getElementById("xblOutput").textContent = await res.text();
}

async function authXSTS() {
    let xblJson;
    try {
        xblJson = JSON.parse(document.getElementById("xblOutput").textContent);
    } catch {
        return alert("XBL auth required first.");
    }

    const res = await fetch("https://minecraftwebclient-backend.onrender.com/auth/xsts", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            xbl_token: xblJson.Token,
            uhs: xblJson.DisplayClaims.xui[0].uhs
        })
    });

    const xstsText = await res.text();
    document.getElementById("xstsOutput").textContent = xstsText;

    // Mark session as authenticated (temporary, in-memory only)
    window.isAuthenticated = true;

    // Show continue button
    document.getElementById("continueBtn").style.display = "block";
}

function goToClient() {
    window.location.href = "client.html";
}

checkForMsToken();
</script>
</body>
</html>
