<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecraft Web Client – Auth Tester</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      padding: 10px;
      margin-top: 6px;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    button {
      padding: 10px 18px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 15px;
    }
    label {
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>Minecraft Auth Tester</h1>

  <h2>Step 1 — Microsoft access_token</h2>
  <p>Get this from /auth/login → /auth/callback.</p>

  <label>access_token</label>
  <textarea id="accessToken"></textarea>
  <button id="sendXBL">Send to /auth/xbl</button>

  <h2>Xbox Live Response</h2>
  <pre id="xblOut">{}</pre>

  <h2>Step 2 — XSTS</h2>
  <label>XBL Token</label>
  <textarea id="xblToken"></textarea>

  <label>UHS</label>
  <textarea id="uhs"></textarea>

  <button id="sendXSTS">Send to /auth/xsts</button>

  <h2>XSTS Response</h2>
  <pre id="xstsOut">{}</pre>

  <h2>Step 3 — Minecraft Services</h2>
  <label>XSTS Token</label>
  <textarea id="xstsToken"></textarea>

  <label>UHS</label>
  <textarea id="uhs2"></textarea>

  <button id="sendMC">Send to /auth/mc</button>

  <h2>Minecraft Response</h2>
  <pre id="mcOut">{}</pre>

  <script>
    const BACKEND = "https://minecraftwebclient-backend.onrender.com"

    const accessToken = document.getElementById("accessToken")
    const sendXBL = document.getElementById("sendXBL")
    const xblOut = document.getElementById("xblOut")

    const xblToken = document.getElementById("xblToken")
    const uhs = document.getElementById("uhs")
    const sendXSTS = document.getElementById("sendXSTS")
    const xstsOut = document.getElementById("xstsOut")

    const xstsToken = document.getElementById("xstsToken")
    const uhs2 = document.getElementById("uhs2")
    const sendMC = document.getElementById("sendMC")
    const mcOut = document.getElementById("mcOut")

    sendXBL.addEventListener("click", async () => {
      const token = accessToken.value.trim()
      if (!token) return xblOut.textContent = "Missing access_token"

      const res = await fetch(`${BACKEND}/auth/xbl`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ access_token: token })
      })

      const data = await res.json()
      xblOut.textContent = JSON.stringify(data, null, 2)

      if (data.Token) xblToken.value = data.Token
      if (data.DisplayClaims?.xui?.[0]?.uhs) uhs.value = data.DisplayClaims.xui[0].uhs
    })

    sendXSTS.addEventListener("click", async () => {
      const token = xblToken.value.trim()
      const userHash = uhs.value.trim()

      if (!token || !userHash)
        return xstsOut.textContent = "Missing xbl_token or uhs"

      const res = await fetch(`${BACKEND}/auth/xsts`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ xbl_token: token, uhs: userHash })
      })

      const data = await res.json()
      xstsOut.textContent = JSON.stringify(data, null, 2)

      if (data.Token) xstsToken.value = data.Token
      if (data.DisplayClaims?.xui?.[0]?.uhs) uhs2.value = data.DisplayClaims.xui[0].uhs
    })

    sendMC.addEventListener("click", async () => {
      const token = xstsToken.value.trim()
      const userHash = uhs2.value.trim()

      if (!token || !userHash)
        return mcOut.textContent = "Missing xsts_token or uhs"

      const res = await fetch(`${BACKEND}/auth/mc`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ xsts_token: token, uhs: userHash })
      })

      const data = await res.json()
      mcOut.textContent = JSON.stringify(data, null, 2)
    })
  </script>

</body>
</html>
