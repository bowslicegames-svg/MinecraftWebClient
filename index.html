<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecraft Web Client – Xbox Live Auth</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      padding: 10px;
      margin-top: 6px;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    button {
      padding: 10px 18px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 15px;
    }
    label {
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>Xbox Live Authentication</h1>

  <p>
    1. Go to <code>/auth/login</code> and sign in.<br>
    2. Copy the <code>access_token</code> from the JSON.<br>
    3. Paste it below and click the button.
  </p>

  <label for="accessToken">Microsoft access_token</label>
  <textarea id="accessToken" placeholder="Paste your access_token here"></textarea>

  <button id="sendBtn">Send to /auth/xbl</button>

  <h2>Response</h2>
  <pre id="output">{}</pre>

  <script>
    const BACKEND = "https://minecraftwebclient-backend.onrender.com"

    const accessTokenInput = document.getElementById("accessToken")
    const sendBtn = document.getElementById("sendBtn")
    const output = document.getElementById("output")

    sendBtn.addEventListener("click", async () => {
      const access_token = accessTokenInput.value.trim()

      if (!access_token) {
        output.textContent = "Error: access_token is empty."
        return
      }

      try {
        const res = await fetch(`${BACKEND}/auth/xbl`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token })
        })

        const data = await res.json()
        output.textContent = JSON.stringify(data, null, 2)
      } catch (err) {
        output.textContent = "Request failed: " + err.message
      }
    })
  </script>

</body>
</html>
